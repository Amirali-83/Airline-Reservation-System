<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Airline Reservation - Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<!-- Navigation -->
<header>
  <nav class="top-nav">
    <div class="nav-left">
      <a href="Flight%20status.html">Flight status</a>
      <a href="checkin.html">Check-in</a>
      <a href="account.html">My account</a>
      <a href="fleet.html">Fleet</a>
    </div>
    <div class="nav-right">
      <a href="signin.html" class="sign-btn">Sign in / Sign Up</a>
    </div>
  </nav>
</header>

<!-- Hero Section -->
<main class="hero">
  <h1>FLY WITH US</h1>

  <form class="search-form">
    <div class="input-row">
      <input type="text" placeholder="From" required />
      <input type="text" placeholder="To" required />
      <input type="date" placeholder="Date" required />
      <input type="number" placeholder="Number of passengers" min="1" required />
      <button type="submit">Search</button>
    </div>

    <div class="class-selection">
      <label><input type="checkbox" name="class" value="economy" /> Economy class</label>
      <label><input type="checkbox" name="class" value="business" /> <strong>Business class</strong></label>
    </div>
  </form>
</main>

<!-- Footer -->
<footer>
  <div class="footer-links">
    <a href="index.html">🏠 Home Page</a>
    <a href="#">📞 Contact us</a>
    <a href="#">❓ Help</a>
  </div>
  <div class="social-icons">
    <a href="#" aria-label="Instagram">📷</a>
    <a href="#" aria-label="Facebook">📘</a>
    <a href="#" aria-label="LinkedIn">💼</a>
    <a href="#" aria-label="Twitter">🐦</a>
  </div>
</footer>
</body>
</html>
